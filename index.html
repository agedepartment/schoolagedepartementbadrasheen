<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الطلاب - PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c7da0">
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: auto; background: white; border-radius: 28px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; color: #1f5068; text-align: center; margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #2c3e50; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 16px; font-size: 1rem; background: #fff; }
    input:read-only { background-color: #e9ecef; color: #495057; }
    .row2 { display: flex; gap: 12px; flex-wrap: wrap; }
    .row2 > div { flex: 1; min-width: 150px; }
    button { background: #2c7da0; color: white; border: none; padding: 14px; width: 100%; border-radius: 40px; font-size: 1.2rem; margin-top: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { background: #1f5068; }
    .button-group { display: flex; gap: 12px; margin-top: 15px; }
    .button-group button { margin-top: 0; }
    .bmi-result { background: #e9f5e9; padding: 12px; border-radius: 20px; margin-top: 15px; text-align: center; font-weight: bold; }
    .status { background: #fff3cd; padding: 10px; border-radius: 16px; margin-top: 15px; text-align: center; font-size: 0.9rem; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 28px; padding: 20px; max-height: 80%; overflow-y: auto; }
    .modal-content h3 { margin-top: 0; }
    .modal-content ul { list-style: none; padding: 0; }
    .modal-content li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .synced { color: green; }
    .pending { color: orange; }
    .close { float: left; cursor: pointer; font-size: 24px; }
    @media (max-width: 600px) {
      .row2 > div { min-width: 100%; }
      .button-group { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 تسجيل بيانات الطلاب</h1>

  <label>🏘️ الوحدة</label>
  <select id="unit"></select>

  <label>🏫 نوع المدرسة</label>
  <select id="schoolType">
    <option value="عام">عام</option>
    <option value="أزهر">أزهر</option>
  </select>

  <label>📚 اسم المدرسة</label>
  <select id="schoolName"></select>

  <div class="row2">
    <div>
      <label>📖 الصف</label>
      <select id="grade">
        <option value="الصف الاول">الصف الاول</option>
        <option value="الصف الثاني">الصف الثاني</option>
        <option value="الصف الثالث">الصف الثالث</option>
        <option value="الصف الرابع">الصف الرابع</option>
        <option value="الصف الخامس">الصف الخامس</option>
        <option value="الصف السادس">الصف السادس</option>
      </select>
    </div>
    <div>
      <label>🏫 الفصل</label>
      <select id="classNumber">
        <option value="">-- اختر الفصل --</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>
  </div>

  <label>👨‍🎓 اسم الطالب (اختر من القائمة)</label>
  <input type="text" id="studentName" list="studentList" placeholder="اكتب اسم الطالب..." autocomplete="off">
  <datalist id="studentList"></datalist>

  <div class="row2">
    <div><label>🆔 الرقم القومي</label><input type="text" id="nationalId" readonly></div>
    <div><label>⚧ النوع</label><input type="text" id="gender" readonly></div>
  </div>

  <div class="row2">
    <div><label>📅 تاريخ الميلاد</label><input type="date" id="birthDate" readonly></div>
    <div><label>📞 تليفون ولي الأمر</label><input type="tel" id="parentPhone" placeholder="أدخل الرقم إن لم يكن موجوداً"></div>
  </div>

  <div class="row2">
    <div><label>📏 الطول (سم)</label><input type="number" id="height" step="0.1"></div>
    <div><label>⚖️ الوزن (كجم)</label><input type="number" id="weight" step="0.1"></div>
    <div><label>🩸 الهيموجلوبين</label><input type="number" id="hemoglobin" step="0.1"></div>
  </div>

  <div class="bmi-result" id="bmiDisplay">📊 مؤشر كتلة الجسم: ---</div>
  <div class="status" id="syncStatus">🟢 جاهز للتسجيل</div>
  <div class="button-group">
    <button id="saveBtn">💾 حفظ البيانات</button>
    <button id="newStudentBtn">➕ طالب جديد</button>
    <button id="showLogBtn">📋 قائمة التسجيل</button>
  </div>
</div>

<div id="logModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>قائمة تسجيلات الجلسة الحالية</h3>
    <ul id="sessionLogList"></ul>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
