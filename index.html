<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>채횢횉찾 횎횙횑챠찼 횉찼횠찼횉횊 - PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c7da0">
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 700px; margin: auto; background: white; border-radius: 28px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; color: #1f5068; text-align: center; margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #2c3e50; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 16px; font-size: 1rem; background: #fff; }
    .row2 { display: flex; gap: 12px; flex-wrap: wrap; }
    .row2 > div { flex: 1; min-width: 120px; }
    button { background: #2c7da0; color: white; border: none; padding: 14px; width: 100%; border-radius: 40px; font-size: 1.2rem; margin-top: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { background: #1f5068; }
    .bmi-result { background: #e9f5e9; padding: 12px; border-radius: 20px; margin-top: 15px; text-align: center; font-weight: bold; }
    .status { background: #fff3cd; padding: 10px; border-radius: 16px; margin-top: 15px; text-align: center; font-size: 0.9rem; }
    hr { margin: 20px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>?? 횎횙횑챠찼 횊챠횉채횉횎 횉찼횠찼횉횊</h1>

  <label>??? 횉찼챈횒횕횋</label>
  <select id="unit"></select>

  <label>?? 채챈횣 횉찼찾횕횗횙횋</label>
  <select id="schoolType">
    <option value="횣횉찾">횣횉찾</option>
    <option value="횄횘책횗">횄횘책횗</option>
  </select>

  <label>?? 횉횙찾 횉찼찾횕횗횙횋</label>
  <select id="schoolName"></select>

  <label>?? 횉찼횛횦</label>
  <select id="grade">
    <option value="횉찼횛횦 횉찼횉챈찼">횉찼횛횦 횉찼횉챈찼</option><option value="횉찼횛횦 횉찼횏횉채챠">횉찼횛횦 횉찼횏횉채챠</option>
    <option value="횉찼횛횦 횉찼횏횉찼횏">횉찼횛횦 횉찼횏횉찼횏</option><option value="횉찼횛횦 횉찼횗횉횊횣">횉찼횛횦 횉찼횗횉횊횣</option>
    <option value="횉찼횛횦 횉찼횓횉찾횙">횉찼횛횦 횉찼횓횉찾횙</option><option value="횉찼횛횦 횉찼횙횉횕횙">횉찼횛횦 횉찼횙횉횕횙</option>
  </select>

  <label>??탑?? 횉횙찾 횉찼횠횉찼횊 (횉횊횎횕횉횁챨 횊횩횎횉횊횋 횒횗횦)</label>
  <input type="text" id="studentName" list="studentList" placeholder="횉횩횎횊 횉횙찾 횉찼횠횉찼횊...">
  <datalist id="studentList"></datalist>

  <div class="row2">
    <div><label>?? 횉찼횗횧찾 횉찼횧챈찾챠</label><input type="text" id="nationalId"></div>
    <div><label>? 횉찼채챈횣</label><select id="gender"><option>횖횩횗</option><option>횄채횏챙</option></select></div>
    <div><label>?? 횎횉횗챠횓 횉찼찾챠찼횉횕</label><input type="date" id="birthDate"></div>
  </div>

  <label>?? 횎찼챠횦챈채 챈찼챠 횉찼횄찾횗</label>
  <input type="tel" id="parentPhone">

  <div class="row2">
    <div><label>?? 횉찼횠챈찼 (횙찾)</label><input type="number" id="height" step="0.1"></div>
    <div><label>?? 횉찼챈횘채 (횩횑찾)</label><input type="number" id="weight" step="0.1"></div>
    <div><label>?? 횉찼책챠찾챈횑찼챈횊챠채</label><input type="number" id="hemoglobin" step="0.1"></div>
  </div>

  <div class="bmi-result" id="bmiDisplay">찾횆횚횗 횩횎찼횋 횉찼횑횙찾: ---</div>
  <div class="status" id="syncStatus">?? 횑횉책횘 찼찼횎횙횑챠찼</div>
  <button id="saveBtn">?? 횒횦횢 횉찼횊챠횉채횉횎</button>
</div>

<script src="app.js"></script>
</body>
</html>
